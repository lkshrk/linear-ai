interface:
  display_name: "Linear Close"
  short_description: "Close reviewed Linear issues with PR, commit, or release evidence."
  default_prompt: "Use $linear-close to verify merged PR, direct issue-ID commit, or squash/import release evidence and close this Linear issue."
dependencies:
  tools:
    - type: "mcp"
      value: "linear"
      description: "Linear MCP server for issue reads, final dashboard/status updates, comments, and labels."
policy:
  allow_implicit_invocation: true
