$schema: https://json-schema.org/draft/2020-12/schema
$id: linear-ai.dashboard.v1
title: Linear AI Dashboard Comment
# Contract: one dashboard comment per issue with a human task list and emoji state markers.
type: object
additionalProperties: false
required:
  - schema
  - issue_id
  - dashboard_revision
  - current_phase
  - llm_state
  - sp_phases
  - tasks
  - blockers
  - next_step
  - updated_by
properties:
  schema:
    const: linear-ai.dashboard.v1
  issue_id:
    type: string
    minLength: 1
  dashboard_revision:
    type: integer
    minimum: 1
  current_phase:
    type: string
    minLength: 1
  llm_state:
    type:
      - string
      - "null"
  sp_phases:
    type: array
    items:
      type: string
      pattern: "^sp-"
  tasks:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - state
        - emoji
        - title
        - evidence
      properties:
        id:
          type: string
          minLength: 1
        state:
          enum:
            - done
            - in_progress
            - blocked
            - deferred
            - todo
        emoji:
          enum:
            - "✅"
            - "🔄"
            - "⏸️"
            - "⬜"
        title:
          type: string
          minLength: 1
        evidence:
          type: string
  blockers:
    type: array
    items:
      type: string
  next_step:
    type: string
    minLength: 1
  updated_by:
    type: string
    minLength: 1
