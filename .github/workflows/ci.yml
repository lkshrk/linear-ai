name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test and package skills
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install

      - name: Install plugin marketplace CLIs
        run: npm install -g @openai/codex @anthropic-ai/claude-code

      - name: Run Bun test suite
        run: bun test

      - name: Validate marked comments
        run: make validate

      - name: Verify review handoff fixture
        run: make verify-handoff

      - name: Run self review checks
        run: make self-review

      - name: Run install smoke checks
        run: make install-smoke

      - name: Run npx skills smoke checks
        run: make skills-smoke

      - name: Run plugin marketplace smoke checks
        run: make marketplace-smoke

      - name: Validate Node runner compatibility
        run: npm run validate:node

      - name: Verify Node handoff compatibility
        run: npm run verify:handoff:node -- --issue-id CIV-999 --status examples/review-ready-status-comment.md --dashboard examples/review-ready-dashboard-comment.md

      - name: Run Node self review compatibility
        run: npm run self-review:node

      - name: Run Node install smoke compatibility
        run: npm run install:smoke:node

      - name: Run Node marketplace smoke compatibility
        run: npm run marketplace:smoke:node

  dispatch-release:
    name: Dispatch release for release tag
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch release workflow
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: tag,
              inputs: {
                tag,
                sha: context.sha,
                force_release: 'false'
              }
            });
            core.info(`Dispatched release.yml for ${tag} at ${context.sha}`);
